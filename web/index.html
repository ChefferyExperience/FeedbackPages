<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <!-- <base href="/"> -->
  <base href="/FeedbackPages/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="feedback_pages">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>feedback_pages</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script>
    (() => {
      const viewport = window.visualViewport;
      if (!viewport) return;

      let baselineHeight = viewport.height;
      let keyboardOpen = false;

      const isEditable = (element) => {
        if (!element) return false;
        const tag = element.tagName;
        return (
          tag === 'INPUT' ||
          tag === 'TEXTAREA' ||
          element.isContentEditable
        );
      };

      const handleViewportChange = () => {
        const active = document.activeElement;
        const height = viewport.height;

        if (!isEditable(active)) {
          baselineHeight = Math.max(baselineHeight, height);
          keyboardOpen = false;
          return;
        }

        if (height < baselineHeight - 80) {
          keyboardOpen = true;
          return;
        }

        if (keyboardOpen && height >= baselineHeight - 20) {
          active.blur();
          keyboardOpen = false;
          baselineHeight = height;
          return;
        }

        baselineHeight = Math.max(baselineHeight, height);
      };

      viewport.addEventListener('resize', handleViewportChange);
      window.addEventListener('orientationchange', () => {
        baselineHeight = viewport.height;
        keyboardOpen = false;
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <!-- <base href="/"> -->
  <base href="/FeedbackPages/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="feedback_pages">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>feedback_pages</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: var(--app-height, 100vh);
      overflow: hidden;
    }

    flutter-view,
    #flt-glass-pane,
    flt-glass-pane,
    flt-scene-host,
    [flt-renderer] {
      height: var(--app-height, 100vh) !important;
    }
  </style>
</head>

<body>
  <script>
    (() => {
      const viewport = window.visualViewport;
      const root = document.documentElement;
      const setAppHeight = () => {
        const height = viewport ? viewport.height : window.innerHeight;
        root.style.setProperty('--app-height', `${height}px`);
      };

      setAppHeight();
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', () => {
        window.setTimeout(setAppHeight, 60);
      });

      if (!viewport) return;

      let baselineHeight = viewport.height;
      let keyboardOpen = false;
      let pendingBlur = null;

      const getDeepActiveElement = (root = document) => {
        let active = root.activeElement;
        while (active && active.shadowRoot && active.shadowRoot.activeElement) {
          active = active.shadowRoot.activeElement;
        }
        return active;
      };

      const isEditable = (element) => {
        if (!element) return false;
        const tag = element.tagName;
        return (
          tag === 'INPUT' ||
          tag === 'TEXTAREA' ||
          element.isContentEditable ||
          element.getAttribute('role') === 'textbox'
        );
      };

      const blurActiveEditor = () => {
        const active = getDeepActiveElement();
        if (active && typeof active.blur === 'function') {
          active.blur();
        }

        const host = document.querySelector('flt-text-editing-host');
        const fallbackEditors = document.querySelectorAll(
          'input, textarea, [contenteditable=""], [contenteditable="true"], [role="textbox"], .flt-text-editing, flt-text-editing-host input, flt-text-editing-host textarea'
        );
        const hostEditors = host
          ? host.querySelectorAll(
            'input, textarea, [contenteditable=""], [contenteditable="true"], [role="textbox"], .flt-text-editing'
          )
          : [];

        if (host && typeof host.blur === 'function') {
          host.blur();
        }

        fallbackEditors.forEach((element) => {
          if (typeof element.blur === 'function') {
            element.blur();
          }
        });

        hostEditors.forEach((element) => {
          if (typeof element.blur === 'function') {
            element.blur();
          }
        });

        if (document.activeElement && typeof document.activeElement.blur === 'function') {
          document.activeElement.blur();
        }

        requestAnimationFrame(() => {
          window.dispatchEvent(new Event('resize'));
          window.scrollTo(window.scrollX, 0);
        });
      };

      const scheduleBlur = () => {
        if (pendingBlur !== null) {
          window.clearTimeout(pendingBlur);
        }
        pendingBlur = window.setTimeout(() => {
          blurActiveEditor();
          pendingBlur = null;
        }, 40);
      };

      const handleViewportChange = () => {
        const height = viewport.height;
        const active = getDeepActiveElement();
        const keyboardLikelyOpen = height < baselineHeight - 80;
        const keyboardLikelyClosed = height >= baselineHeight - 20;

        setAppHeight();

        if (keyboardLikelyOpen) {
          keyboardOpen = true;
        }

        if (!isEditable(active) && !keyboardOpen) {
          baselineHeight = Math.max(baselineHeight, height);
          return;
        }

        if (keyboardLikelyOpen) {
          return;
        }

        if (keyboardOpen && keyboardLikelyClosed) {
          scheduleBlur();
          keyboardOpen = false;
          baselineHeight = height;
          return;
        }

        baselineHeight = Math.max(baselineHeight, height);
      };

      viewport.addEventListener('resize', handleViewportChange);
      window.addEventListener('orientationchange', () => {
        baselineHeight = viewport.height;
        keyboardOpen = false;
        setAppHeight();
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
